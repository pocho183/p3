# TLS
tls.enabled=true
tls.keystore.path=classpath:certs/server.p12
tls.keystore.password=changeit
tls.truststore.path=classpath:certs/client-truststore.jks
tls.truststore.password=changeit

# Local-idetifier in x413 inside p7 protocol
p3.mts.local-id.country=it
p3.mts.local-id.city=rm
p3.mts.local-id.node=cn1
p3.mts.local-id.sequence=1364301

# P3 gateway settings (for UA access integration)
p3.gateway.enabled=true
p3.gateway.host=0.0.0.0
p3.gateway.port=102
p3.gateway.max-sessions=64
p3.gateway.tls.need-client-auth=false
p3.gateway.text.welcome-enabled=false
p3.gateway.listener-profile=STANDARD_P3